version: "3.9"

services:

  backend:

    build: ./server

    ports:
      - "5000:5000"

    env_file:
      - ./server/.env

    restart: always



  frontend:

    build: ./client

    ports:
      - "5173:5173"

    environment:
      - VITE_API_URL=http://localhost:5000

    depends_on:
      - backend

    restart: always